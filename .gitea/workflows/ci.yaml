name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  security-scan:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

  build-and-push:
    runs-on: docker
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rythm-frontend:1.0

      - name: Build & Push API 1
        uses: docker/build-push-action@v5
        with:
          context: ./api1
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rythm-api1:1.0

      - name: Build & Push API 2
        uses: docker/build-push-action@v5
        with:
          context: ./api2
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rythm-api2:1.0
